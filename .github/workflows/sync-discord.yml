name: Discord Sync (Infographics)

on:
  schedule:
    # Jeden Dienstag um 20:00 UTC (kurz nach dem Weekly Reset)
    - cron: '0 20 * * 2'
  workflow_dispatch: # Erlaubt manuelles Starten über den GitHub UI Tab
  repository_dispatch: # Erlaubt externes Triggern (z.B. von n8n)
    types: [trigger-sync]

jobs:
  sync-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Discord Sync (Rendering)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LITTLELIGHT_URL: ${{ secrets.LITTLELIGHT_URL }}
          # Falls das Limit im Script aufgehoben werden soll, kann hier eine Env-Variable gesetzt werden
          # DISCORD_POST_LIMIT: all
        run: npm run discord-sync

      - name: Commit and Push State
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add scripts/discordState.json
          git commit -m "chore(discord): update sync state [skip ci]" || echo "No changes to commit"
          git push
