name: Discord Sync (Infographics)

on:
  schedule:
    # Jeden Dienstag um 20:00 UTC (Sicherheits-Run)
    - cron: '0 20 * * 2'
    # Zusätzlicher Check jede Stunde
    - cron: '0 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-sync]

jobs:
  sync-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Godroll Database updates (Watchdog)
        id: watchdog
        run: |
          # Wenn manuell gestartet (dispatch), erzwingen wir den Lauf
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "FORCE_RUN=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          URL="${{ secrets.GODROLL_DATABASE_URL }}"
          HASH_FILE="scripts/godroll_database_hash.txt"
          
          # Sicherstellen dass die Datei existiert
          touch $HASH_FILE
          OLD_HASH=$(cat $HASH_FILE)
          
          # Aktuellen Hash von der URL holen
          NEW_HASH=$(curl -sL "$URL" | md5sum | cut -d' ' -f1)
          
          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "Changes detected in Godroll Database! Proceeding with sync..."
            echo "$NEW_HASH" > $HASH_FILE
            echo "FORCE_RUN=true" >> $GITHUB_OUTPUT
          else
            echo "No changes in Godroll Database JSON. Skipping rendering."
            echo "FORCE_RUN=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.watchdog.outputs.FORCE_RUN == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        if: steps.watchdog.outputs.FORCE_RUN == 'true'
        run: npm ci

      - name: Run Discord Sync (Rendering)
        if: steps.watchdog.outputs.FORCE_RUN == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GODROLL_DATABASE_URL: ${{ secrets.GODROLL_DATABASE_URL }}
        run: npm run discord-sync

      - name: Commit and Push Changes (State & Hash)
        if: steps.watchdog.outputs.FORCE_RUN == 'true'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add scripts/discordState.json scripts/godroll_database_hash.txt
          git commit -m "chore(sync): update discord state & godroll database hash [skip ci]" || echo "No changes to commit"
          git push
