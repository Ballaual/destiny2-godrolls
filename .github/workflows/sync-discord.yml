name: Discord Sync (Infographics)

on:
  schedule:
    # Check alle 6 Stunden
    - cron: '0 */6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-sync]

permissions:
  contents: write

jobs:
  sync-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Godroll Database updates (Watchdog)
        id: watchdog
        run: |
          URL="${{ secrets.GODROLL_DATABASE_URL }}"
          HASH_FILE="data/godroll_database_hash.txt"
          
          # Sicherstellen dass Verzeichnis und Datei existieren
          mkdir -p data
          touch $HASH_FILE
          OLD_HASH=$(cat $HASH_FILE)
          
          # Aktuellen Hash von der URL holen
          NEW_HASH=$(curl -sL "$URL" | md5sum | cut -d' ' -f1)
          
          # Status-Check: Ist es ein automatischer Lauf oder eine manuelle Anforderung?
          if [ "$OLD_HASH" != "$NEW_HASH" ] || [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "Changes detected or manual trigger! Proceeding with sync..."
            echo "FORCE_RUN=true" >> $GITHUB_OUTPUT
          else
            echo "No changes in Godroll Database JSON. Skipping rendering."
            echo "FORCE_RUN=false" >> $GITHUB_OUTPUT
          fi
          
          # Hash-Datei immer aktualisieren, damit der Stand synchron bleibt
          echo "$NEW_HASH" > $HASH_FILE

      - name: Setup Node.js
        if: steps.watchdog.outputs.FORCE_RUN == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        if: steps.watchdog.outputs.FORCE_RUN == 'true'
        run: npm ci

      - name: Run Discord Sync (Rendering)
        if: steps.watchdog.outputs.FORCE_RUN == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VITE_GODROLL_DATABASE_URL: ${{ secrets.GODROLL_DATABASE_URL }}
        run: npm run discord-sync

      - name: Commit and Push Changes (State & Hash)
        if: steps.watchdog.outputs.FORCE_RUN == 'true'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add -f data/discordState.json data/godroll_database_hash.txt
          git commit -m "chore(sync): update discord state & godroll database hash [skip ci]" || echo "No changes to commit"
          git pull --rebase
          git push
