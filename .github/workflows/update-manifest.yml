name: Update Destiny Manifest

on:
  schedule:
    # Jeden Dienstag um 19:30 UTC (Passend zum Destiny 2 Weekly Reset)
    - cron: '30 19 * * 2'
  workflow_dispatch: # Erlaubt manuelles Starten über den GitHub Tab

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Manifest Update Script
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
          LITTLELIGHT_URL: ${{ secrets.LITTLELIGHT_URL }}
        run: npm run sync

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add public/destinyData.json
          git commit -m "chore(manifest): auto-update destiny2 database [skip ci]" || echo "No changes to commit"
          git push
